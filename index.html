   <style>
        body { font-family: 'Assistant', sans-serif; scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
        .star-icon { cursor: pointer; font-size: clamp(2rem, 10vw, 2.5rem); color: white; transition: 0.2s; text-shadow: 0 0 5px rgba(0,0,0,0.2); }
        .dev-star { cursor: pointer; font-size: 1.8rem; color: #cbd5e1; transition: 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        #dev-popup { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(150%); }
        input, textarea { font-size: 16px !important; }
        .clickable-img { cursor: pointer; transition: 0.3s; }
        .clickable-img:hover { opacity: 0.95; transform: scale(1.01); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .carousel-item { scroll-snap-align: center; flex: 0 0 85%; }

        /* CSS של החסימה */
        #payment-lock {
            position: fixed;
            inset: 0;
            background: #0f172a;
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <div id="payment-lock">
        <h1 class="text-white text-4xl md:text-6xl font-black italic tracking-tighter animate-pulse">

        </h1>
    </div>
